# ============================================================================
# Tmux Configuration
# ============================================================================
# Bundled in terminal-setup for portability.
# To use: tmux -f /path/to/terminal-setup/config/tmux.conf
# Or symlink: ln -sf /path/to/terminal-setup/config/tmux.conf ~/.tmux.conf
# ============================================================================

# Pane management
bind-key -n C-p split-window -h
bind-key -n C-v split-window -v
bind-key -n C-w kill-pane

# Enable mouse support
set -g mouse on

# Detach
bind-key -n C-d detach

# Window management
bind-key -n C-n new-window
set -g base-index 1
set -g pane-base-index 1

# Portable tmux configuration managed by terminal-setup.

# Ctrl-a is easier to reach than tmux's default Ctrl-b prefix. Press Ctrl-a
# twice to send a literal Ctrl-a to the program running inside a pane.
unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# New panes and windows start in the current pane's working directory.
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# Vim-style pane navigation and repeatable resizing.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key Left select-pane -L
bind-key Down select-pane -D
bind-key Up select-pane -U
bind-key Right select-pane -R
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Window and session management.
bind-key n next-window
bind-key p previous-window
bind-key x kill-pane
bind-key X kill-session
bind-key d detach-client
bind-key r source-file "$TERMINAL_SETUP_HOME/config/tmux.conf" \; display-message "Configuration reloaded"

# Enable pane selection, border dragging, and scrollback with the mouse. Hold
# the terminal's mouse-bypass modifier while dragging to select text normally.
set-option -g mouse on

# Consistent numbering and a generous per-pane scrollback buffer.
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g history-limit 100000

# Keep escape-based key combinations responsive without making SSH sessions
# overly sensitive to network latency.
set-option -sg escape-time 10
